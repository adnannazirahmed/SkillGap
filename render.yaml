services:
  - type: web
    name: skillgap-analyzer
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_ADMIN_NAME
        sync: false
